<!doctype html>
<html lang="en" style="height: 100%;">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fizzy</title>
    <meta name="description" content="fizzy — pixel art editor in your browser." />
    <link rel="icon" type="image/png" href="/img/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600;700&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #22232a;
        --text: #e6af89;
        --text-muted: #9f9fb0;
        --accent: #2fb387;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text-muted);
        font-family: "Noto Sans", system-ui, sans-serif;
      }
      #app-root {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #dvui-canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        caret-color: transparent;
      }
      /* Do not set `display: flex` on [hidden] panels — it overrides the hidden attribute. */
      #loading:not(.is-hidden),
      #error-panel:not([hidden]) {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
        background: var(--bg);
        z-index: 2;
      }
      #loading:not(.is-hidden) {
        pointer-events: none;
      }
      #error-panel:not([hidden]) {
        pointer-events: auto;
      }
      #loading.is-hidden,
      #error-panel[hidden] {
        display: none !important;
      }
      .brand {
        font-family: "Comfortaa", system-ui, sans-serif;
        font-weight: 700;
        font-size: clamp(28px, 5vw, 40px);
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .status {
        font-size: 15px;
        max-width: 420px;
        line-height: 1.5;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #34363f;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .home-link {
        margin-top: 8px;
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      .home-link:hover { text-decoration: underline; }
    </style>
  </head>
  <body style="height: 100%; margin: 0; padding: 0;">
    <div id="app-root">
      <canvas id="dvui-canvas" tabIndex="1" style="display: block; width: 100%; height: 100%; outline: none; caret-color: transparent;"></canvas>
      <div id="loading" aria-live="polite">
        <div class="brand">fizzy</div>
        <div class="spinner" aria-hidden="true"></div>
        <p class="status" id="loading-status">Loading editor…</p>
      </div>
      <div id="error-panel" role="alert" hidden>
        <div class="brand">fizzy</div>
        <p class="status" id="error-message"></p>
        <a class="home-link" href="/">Back to fizzyed.it</a>
      </div>
    </div>
    <script type="module">
      const loadingEl = document.getElementById("loading");
      const errorPanel = document.getElementById("error-panel");
      const errorMessage = document.getElementById("error-message");

      function hideLoading() {
        loadingEl.classList.add("is-hidden");
      }

      function showError(message) {
        hideLoading();
        errorMessage.textContent = message;
        errorPanel.hidden = false;
      }

      function hasWebGl() {
        const probe = document.createElement("canvas");
        return !!(probe.getContext("webgl2") || probe.getContext("webgl"));
      }

      /** Wait until layout has settled so clientWidth/Height are correct. */
      function waitForLayout() {
        return new Promise((resolve) => {
          requestAnimationFrame(() => requestAnimationFrame(resolve));
        });
      }

      // Trackpad pinch arrives as a `wheel` event with `ctrlKey=true` and `deltaMode=0`
      // (every modern browser synthesizes this). Two things to do here in the capture phase,
      // before dvui's bubble-phase listener on the canvas:
      //   1. preventDefault + stopImmediatePropagation — keeps the browser from page-zooming
      //      and keeps dvui's wheel handler from folding the tiny pinch delta into its
      //      `scroll_lowest` minimum (an all-time min that never resets and otherwise
      //      poisons trackpad scroll sensitivity for the rest of the session).
      //   2. Forward the magnification into the wasm trackpad accumulator
      //      (`FizzyWebTrackpadMagnification`). The canvas widget drains it each frame and
      //      applies the same scale-around-point math used by macOS native pinch.
      // `dvuiApp` starts null and is filled in once the app loads — events that arrive
      // before then are still safely suppressed.
      // Scale factor (100): browser pinch deltaY is roughly ±1..±20 per event; dividing by
      // 100 produces ratios around 1.01..1.2 per event, matching the magnitude AppKit
      // reports for native trackpad gestures. Negate deltaY because positive deltaY means
      // "pinch fingers together = zoom out".
      let dvuiApp = null;
      const dvuiCanvas = document.getElementById("dvui-canvas");
      dvuiCanvas.addEventListener("wheel", (ev) => {
        if (ev.ctrlKey && ev.deltaMode === 0) {
          ev.preventDefault();
          ev.stopImmediatePropagation();
          if (dvuiApp && dvuiApp.instance.exports.FizzyWebTrackpadMagnification) {
            dvuiApp.instance.exports.FizzyWebTrackpadMagnification(-ev.deltaY / 100);
            // dvui normally calls `requestRender` from its own wheel listener — since we
            // swallowed the event in the capture phase, drive the frame loop ourselves so
            // the canvas widget actually drains the accumulator we just wrote.
            dvuiApp.requestRender();
          }
        }
      }, { capture: true, passive: false });

      if (!hasWebGl()) {
        showError("This browser does not support WebGL, which fizzy needs to run.");
      } else {
        const wasmUrl = "web.wasm?cache-buster=TEMPLATE_HASH_WITH_PADDING__ITS_64_BYTES_LONG_THE_SAME_AS_SHA256";
        waitForLayout()
          .then(() => import("./web.js?cache-buster=TEMPLATE_HASH_WITH_PADDING__ITS_64_BYTES_LONG_THE_SAME_AS_SHA256"))
          .then(({ dvui }) => dvui("#dvui-canvas", wasmUrl))
          .then((app) => {
            // Late-bind the app reference so the capture-phase wheel listener above can
            // forward pinch deltas into the trackpad accumulator and kick a render.
            dvuiApp = app;
            window.dispatchEvent(new Event("resize"));
            app.requestRender();
            hideLoading();
          })
          .catch((err) => {
            console.error(err);
            const detail = err instanceof Error ? err.message : String(err);
            showError(`Failed to load the editor (${detail}). Try a hard refresh, or use a recent Chrome, Firefox, or Safari.`);
          });
      }
    </script>
  </body>
</html>
